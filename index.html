<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VX15 PRO Pano Sistemi</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --border:#d7deea;
      --text:#1f2937;
      --muted:#6b7280;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --red:#dc2626;
      --gray:#6b7280;
      --green:#16a34a;
      --din:#eef6ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:14px;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      display:grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      margin-bottom:14px;
    }
    .title{
      font-size:20px;
      font-weight:700;
      margin-bottom:12px;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:-6px;
      margin-bottom:10px;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:end;
    }
    .field{
      min-width:150px;
      flex:1;
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }
    select,input{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      font-size:14px;
    }
    button{
      border:none;
      border-radius:8px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      background:var(--blue);
      color:#fff;
    }
    button.gray{background:var(--gray)}
    button.red{background:var(--red)}
    button.green{background:var(--green)}
    button.small{
      padding:6px 10px;
      font-size:12px;
      margin-right:4px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      border-bottom:1px solid #eef2f7;
      text-align:left;
      padding:8px 6px;
      vertical-align:top;
    }
    th{
      font-size:12px;
      color:var(--muted);
    }

    .schema-flow{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
    }
    .schema-box{
      min-width:120px;
      background:var(--blue-soft);
      border:1px solid #b9d4ff;
      border-radius:10px;
      padding:10px;
      font-size:13px;
      text-align:center;
    }
    .arrow{
      font-size:18px;
      color:var(--muted);
    }

    .din-card{
      background:var(--din);
      border:1px solid #cfe2ff;
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }
    .din-head{
      font-weight:700;
      margin-bottom:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .din-body{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      min-height:52px;
    }
    .mod{
      background:#fff;
      border:1px solid #bfd4ff;
      border-radius:8px;
      min-width:84px;
      padding:8px 6px;
      text-align:center;
      font-size:12px;
      line-height:1.25;
    }
    .mod small{
      display:block;
      color:var(--muted);
      margin-top:2px;
      font-size:11px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:8px;
    }
    .summary-box{
      background:#f8fafc;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
    }
    .summary-box b{
      display:block;
      font-size:18px;
      margin-top:4px;
    }
    .ok{color:#166534}
    .warn{color:#92400e}
    .empty{
      color:var(--muted);
      font-size:13px;
      padding:8px 0;
    }
    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
    }
  </style>
</head>
