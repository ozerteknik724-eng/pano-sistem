<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX20 PRO Pano Sistemi</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
button{padding:6px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px}
input,select{padding:6px;margin:3px}

.box{display:inline-block;padding:6px;margin:4px;border-radius:6px}
.din{background:#dbeafe}
.taban{background:#fef3c7}
.group{border:2px solid #ccc;border-radius:10px;padding:10px;margin:5px}
.baslik{font-weight:bold;margin-bottom:5px}
</style>
</head>

<body>

<div class="card">
<b>ELEMAN EKLE</b><br>

Grup:
<select id="grup">
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>TMŞ</option>
<option>BARA</option>
</select>

Rol:
<select id="rol">
<option>ÇIKIŞ</option>
<option>ANA GİRİŞ</option>
</select>

Montaj:
<select id="montaj">
<option>DIN</option>
<option>TABAN</option>
</select>

Çıkış:
<input id="cikis" placeholder="Çıkış1">

Genişlik:
<input id="w" value="7">

<button onclick="ekle()">EKLE</button>
</div>

<div class="card">
<b>EKLENENLER</b>
<div id="liste"></div>
</div>

<div class="card">
<b>PANO YERLEŞİM</b>

<div id="giris"></div>
<div id="cikislar"></div>
<div id="taban"></div>

</div>

<div class="card">
<b>MALZEME</b>
<div id="malzeme"></div>
</div>

<script>

let satirlar=[];

function ekle(){

let g=document.getElementById("grup").value;
let r=document.getElementById("rol").value;
let m=document.getElementById("montaj").value;
let c=document.getElementById("cikis").value;
let w=parseFloat(document.getElementById("w").value)||5;

satirlar.push({g,r,m,c,w});

render();
}

function render(){

// liste
let html="";
satirlar.forEach((x,i)=>{
html+=`${i+1}) ${x.g} - ${x.r} - ${x.m} - ${x.c} (${x.w}cm)<br>`;
});
document.getElementById("liste").innerHTML=html;


// giriş
let girisHTML="";
satirlar.filter(x=>x.r=="ANA GİRİŞ").forEach(x=>{
girisHTML+=`<span class="box ${x.m=="DIN"?"din":"taban"}">${x.g}</span>`;
});
document.getElementById("giris").innerHTML="<div class='group'><div class='baslik'>ANA GİRİŞ</div>"+girisHTML+"</div>";


// çıkış grup sistemi
let cikisGruplar={};

satirlar.filter(x=>x.r=="ÇIKIŞ").forEach(x=>{
if(!cikisGruplar[x.c]) cikisGruplar[x.c]=[];
cikisGruplar[x.c].push(x);
});

let cikisHTML="";

for(let key in cikisGruplar){

cikisHTML+=`<div class="group">
<div class="baslik">${key}</div>`;

cikisGruplar[key].forEach(x=>{
cikisHTML+=`<span class="box ${x.m=="DIN"?"din":"taban"}">${x.g}</span>`;
});

cikisHTML+="</div>";
}

document.getElementById("cikislar").innerHTML=cikisHTML;


// taban
let tabanHTML="";
satirlar.filter(x=>x.m=="TABAN").forEach(x=>{
tabanHTML+=`<span class="box taban">${x.g}</span>`;
});
document.getElementById("taban").innerHTML="<div class='group'><div class='baslik'>TABAN</div>"+tabanHTML+"</div>";


// malzeme
let sayim={};

satirlar.forEach(x=>{
sayim[x.g]=(sayim[x.g]||0)+1;
});

let mhtml="";
for(let k in sayim){
mhtml+=`${k} x ${sayim[k]}<br>`;
}

document.getElementById("malzeme").innerHTML=mhtml;

}

</script>

</body>
</html>
