
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX Web Pano</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}
.card{background:#fff;padding:12px;margin:10px;border-radius:10px}
button{padding:10px;border:none;border-radius:6px;background:#2563eb;color:#fff;margin:4px}
input,select{padding:8px;margin:4px}
.box{display:inline-block;padding:10px;margin:5px;background:#dbeafe;border-radius:8px}
</style>
</head>

<body>

<div class="card">
<b>ŞEMA GİRİŞ</b><br>

<select id="urun">
<option value="RCCB">RCCB 4x40</option>
<option value="MCB">MCB</option>
<option value="KON">Kontaktör</option>
<option value="MTK">Motor Koruma</option>
</select>

<input id="yer" placeholder="ÇIKIŞ-1">
<input id="adet" type="number" value="1">

<button onclick="ekle()">EKLE</button>
<button onclick="demo()">DEMO</button>
</div>

<div class="card">
<b>ŞEMA</b>
<div id="sema"></div>
</div>

<div class="card">
<b>PANO</b>
<div id="panel"></div>
</div>

<div class="card">
<b>MALZEME</b>
<div id="liste"></div>
</div>

<script>

let veri=[];

const genislikler={
"RCCB":7.2,
"MCB":1.8,
"KON":5.5,
"MTK":3.5
};

function ekle(){
let P=document.getElementById("urun").value;
let A=document.getElementById("yer").value;
let Q=parseInt(document.getElementById("adet").value);

veri.push({P,A,Q});
render();
}

function demo(){
veri=[
{P:"RCCB",A:"GİRİŞ",Q:1},
{P:"MCB",A:"ÇIKIŞ-1",Q:3},
{P:"KON",A:"MOTOR",Q:1}
];
render();
}

function render(){

let semaHTML="";
veri.forEach(d=>{
semaHTML+=`<div>${d.P} - ${d.A} (${d.Q})</div>`;
});
document.getElementById("sema").innerHTML=semaHTML;

let w=0,din=1,phtml="";
veri.forEach(d=>{
let toplam=genislikler[d.P]*d.Q;

if(w+toplam>37){
din++;
w=0;
}

phtml+=`<div class="box">DIN-${din}<br>${d.P}</div>`;
w+=toplam;
});
document.getElementById("panel").innerHTML=phtml;

let m={};
veri.forEach(d=>{
m[d.P]=(m[d.P]||0)+d.Q;
});

let mhtml="";
for(let k in m){
mhtml+=k+" x "+m[k]+"<br>";
}
document.getElementById("liste").innerHTML=mhtml;

}

</script>

</body>
</html>
