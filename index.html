<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX19 Pano Sistemi</title>

<style>
body {font-family: Arial; background:#f3f6fb; padding:10px}

.card {background:#fff; padding:12px; margin-bottom:10px; border-radius:10px}

button {padding:6px 10px; background:#2563eb; color:#fff; border:none; border-radius:6px}

input, select {padding:6px; margin:3px}

.item {background:#eef; padding:6px; margin:3px; border-radius:6px; display:inline-block}
</style>
</head>

<body>

<div class="card">
<b>Ürün Ekle</b><br>

Ürün:
<select id="urun">
  <option value="RCCB">RCCB</option>
  <option value="MCB">MCB</option>
  <option value="KONTAKTÖR">KONTAKTÖR</option>
</select>

Montaj:
<select id="montaj">
  <option value="DIN">DIN</option>
  <option value="TABAN">TABAN</option>
</select>

Genişlik (cm):
<input id="w" value="7">

<button onclick="ekle()">EKLE</button>
</div>

<div class="card">
<b>Eklenenler</b>
<div id="liste"></div>
</div>

<div class="card">
<b>DIN Hesap</b><br><br>

Ray Genişliği:
<input id="dinGenislik" value="37">

<button onclick="dinHesapla()">HESAPLA</button>

<div id="dinSonuc"></div>
</div>

<script>

let satirlar = [];

function ekle(){
  let urun = document.getElementById("urun").value;
  let montaj = document.getElementById("montaj").value;
  let w = parseFloat(document.getElementById("w").value);

  satirlar.push({urun, montaj, w});

  goster();
}

function goster(){
  let html = "";

  satirlar.forEach(x=>{
    html += `<div class="item">${x.urun} - ${x.montaj} (${x.w} cm)</div>`;
  });

  document.getElementById("liste").innerHTML = html;
}

function dinHesapla(){

  let maxGenislik = parseFloat(document.getElementById("dinGenislik").value) || 37;

  let dinler = [];
  let aktifDin = [];
  let toplam = 0;

  satirlar.forEach(item => {

    if(item.montaj !== "DIN") return;

    if(toplam + item.w > maxGenislik){
      dinler.push({liste:[...aktifDin], toplam});
      aktifDin = [];
      toplam = 0;
    }

    aktifDin.push(item);
    toplam += item.w;

  });

  if(aktifDin.length > 0){
    dinler.push({liste:[...aktifDin], toplam});
  }

  let html = "";

  dinler.forEach((din, i)=>{
    let durum = din.toplam <= maxGenislik ? "UYGUN" : "TAŞTI";

    html += `
    <div style="margin-top:10px;padding:10px;border:1px solid #ccc;border-radius:8px">
      <b>DIN-${i+1}</b> → ${din.toplam} / ${maxGenislik} cm → 
      <span style="color:${durum==="UYGUN"?"green":"red"}">${durum}</span><br>
    `;

    din.liste.forEach(x=>{
      html += `<span class="item">${x.urun}</span>`;
    });

    html += "</div>";
  });

  document.getElementById("dinSonuc").innerHTML = html;
}

</script>

</body>
</html>
