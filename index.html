<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>VX28 Şema Motoru</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}

.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}

input,select{padding:6px;margin:3px}
button{padding:6px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px}

canvas{
background:#fff;
border:1px solid #ccc;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<b>ELEMAN EKLE</b><br><br>

Grup:
<select id="g">
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BUTON</option>
<option>LAMBA</option>
</select>

Ürün:
<input id="u" placeholder="Örn: 4x40">

Rol:
<select id="r">
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="a" placeholder="ÇIKIŞ-1">

Bağlı:
<input id="b" placeholder="ÇIKIŞ-1">

<button onclick="ekle()">EKLE</button>
<button onclick="ciz()">ÇİZ</button>

</div>

<canvas id="c" width="1000" height="500"></canvas>

<script>

let data=[]

function ekle(){
data.push({
g:g.value,
u:u.value,
r:r.value,
a:a.value,
b:b.value
})
}

function ciz(){

let ctx = document.getElementById("c").getContext("2d")
ctx.clearRect(0,0,1000,500)

let x=50
let y=100

let guc = data.filter(x=>x.r=="ÇIKIŞ")

guc.forEach((e,i)=>{

// kutu
ctx.strokeRect(x,y,100,40)
ctx.fillText(e.g, x+10, y+15)
ctx.fillText(e.u, x+10, y+30)

// çizgi
if(i>0){
ctx.beginPath()
ctx.moveTo(x-50+100,y+20)
ctx.lineTo(x,y+20)
ctx.stroke()
}

x+=150

})

// kumanda
let kum = data.filter(x=>x.r=="KUMANDA")

let ky=250
let kx=50

kum.forEach((e,i)=>{

ctx.strokeRect(kx,ky,100,40)
ctx.fillText(e.g, kx+10, ky+15)

// bağlantı çizgisi yukarı
ctx.beginPath()
ctx.moveTo(kx+50,ky)
ctx.lineTo(kx+50,150)
ctx.stroke()

kx+=150

})

}

</script>

</body>
</html>
