<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX18 PRO Pano Sistemi</title>

<style>
body {font-family: Arial; background:#f3f6fb; padding:10px}

.card {background:#fff; padding:12px; margin-bottom:10px; border-radius:10px}

select,input {padding:6px; margin:3px}

button {padding:6px 10px; background:#2563eb; color:#fff; border:none; border-radius:6px}

.group-box {border:2px solid #ddd; border-radius:10px; padding:10px; margin:5px}

.giris {background:#e0f2fe}
.cikis {background:#dcfce7}
.taban {background:#fef3c7}

.item {background:#eef; padding:5px; margin:3px; border-radius:6px}

.wrap {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:8px}

.kumanda {background:#f5f3ff}

.small {font-size:12px;color:#555}
</style>

</head>
<body>

<div class="card">
<b>VX18 PRO — Akıllı Pano</b><br><br>

Grup:
<select id="grup">
<option>TMŞ</option>
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BARA</option>
<option>BUTON</option>
<option>LAMBA</option>
<option>PAKO</option>
</select>

Ürün:
<input id="urun" placeholder="Örn: Kontaktör 25A">

Rol:
<select id="rol">
<option>ANA GİRİŞ</option>
<option>DAĞITIM</option>
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Montaj:
<select id="montaj">
<option>DIN</option>
<option>TABAN</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="adres" placeholder="ÇIKIŞ-1">

Adet:
<input id="adet" value="1" type="number">

<br><br>

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>
</div>

<div class="card">
<b>ŞEMA</b>
<div id="liste"></div>
</div>

<div class="card">
<b>PANO YERLEŞİMİ</b>

<div id="pano"></div>

</div>

<div class="card kumanda">
<b>KUMANDA ALANI</b>
<div id="kumanda"></div>
</div>

<script>

let data=[]

function kontakTipi(grup){
if(grup=="BUTON") return "NO/NC"
if(grup=="KONTAKTÖR") return "13-14"
if(grup=="MOTOR KORUMA") return "13-14 / 21-22"
return "-"
}

function ekle(){
let g=grup.value
let u=urun.value
let r=rol.value
let m=montaj.value
let a=adres.value
let adet=parseInt(adet.value)

for(let i=0;i<adet;i++){
data.push({g,u,r,m,a})
}

render()
}

function temizle(){
data=[]
render()
}

function render(){

// liste
liste.innerHTML=data.map((x,i)=>
`${i+1}. ${x.g} - ${x.u} (${x.a}) [${kontakTipi(x.g)}]`
).join("<br>")

// gruplama
let grupObj={}

data.forEach(x=>{
let key=x.a || x.r
if(!grupObj[key]) grupObj[key]=[]
grupObj[key].push(x)
})

// pano
pano.innerHTML='<div class="wrap">'+
Object.keys(grupObj).map(k=>{

let cls="group-box"
if(k.includes("GİRİŞ")) cls+=" giris"
else if(k.includes("ÇIKIŞ")) cls+=" cikis"
else cls+=" taban"

return `<div class="${cls}">
<b>${k}</b><br>
${grupObj[k].map(x=>
`<div class="item">${x.g}<br><span class="small">${kontakTipi(x.g)}</span></div>`
).join("")}
</div>`

}).join("")+'</div>'

// kumanda
kumanda.innerHTML=data
.filter(x=>x.m=="KUMANDA")
.map(x=>`<div class="item">${x.g} (${kontakTipi(x.g)})</div>`)
.join("")
}

</script>

</body>
</html>
