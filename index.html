<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>VX29 MASTER - AKIŞ MOTORU</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}

.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}

input,select{padding:6px;margin:3px}

button{padding:6px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px}

canvas{
background:#fff;
border:1px solid #ccc;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">
<b>ELEMAN EKLE</b><br><br>

Grup:
<select id="g">
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BUTON</option>
<option>LAMBA</option>
<option>PAKO</option>
</select>

Ürün:
<input id="u" placeholder="Örn: Kontaktör 25A">

Rol:
<select id="r">
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="a" placeholder="ÇIKIŞ-1">

Bağlı:
<input id="b" placeholder="ÇIKIŞ-1">

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>
</div>

<div class="card">
<b>ÇİZİM</b>
<canvas id="c" width="900" height="600"></canvas>
</div>

<script>

let data=[]

function ekle(){
data.push({
g:g.value,
u:u.value,
r:r.value,
a:a.value,
b:b.value
})
ciz()
}

function temizle(){
data=[]
ciz()
}

function ciz(){

let canvas=document.getElementById("c")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,900,600)

let gruplar={}

data.forEach(x=>{
let key=x.a
if(!gruplar[key]) gruplar[key]=[]
gruplar[key].push(x)
})

let xPos=100

Object.keys(gruplar).forEach(k=>{

let yPos=50

// ANA HAT
ctx.beginPath()
ctx.moveTo(xPos,30)
ctx.lineTo(xPos,550)
ctx.stroke()

ctx.fillText(k,xPos-20,20)

// ELEMANLAR
gruplar[k].forEach((el,i)=>{

let boxY=yPos+(i*80)

// çizgi
ctx.beginPath()
ctx.moveTo(xPos,boxY-20)
ctx.lineTo(xPos,boxY)
ctx.stroke()

// kutu
ctx.strokeRect(xPos-40,boxY,80,40)

// yazı
ctx.fillText(el.g,xPos-30,boxY+15)
ctx.fillText(el.u,xPos-30,boxY+30)

})

// KUMANDA (yan)
let kumanda = data.filter(x=>x.r=="KUMANDA" && x.b==k)

let ky=100

kumanda.forEach((el,i)=>{

let kx=xPos+120
let boxY=ky+(i*80)

// bağlantı çizgisi
ctx.beginPath()
ctx.moveTo(xPos,boxY+20)
ctx.lineTo(kx-40,boxY+20)
ctx.stroke()

// kutu
ctx.strokeRect(kx-40,boxY,80,40)

// yazı
ctx.fillText(el.g,kx-30,boxY+15)
ctx.fillText(el.u,kx-30,boxY+30)

})

xPos+=250

})

}

</script>

</body>
</html>
