<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>VX21 MASTER</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}

.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}

input,select{padding:6px;margin:3px}
button{padding:6px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px}

.wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:8px}

.group{border:2px solid #ccc;border-radius:10px;padding:10px}

.baslik{font-weight:bold;margin-bottom:5px}

.din{background:#dbeafe;padding:5px;margin:3px;border-radius:5px}
.taban{background:#fef3c7;padding:5px;margin:3px;border-radius:5px}

.kumanda{background:#ede9fe}
.giris{background:#e0f2fe}
.dagitim{background:#fce7f3}
.cikis{background:#dcfce7}

.small{font-size:11px;color:#555}
</style>
</head>

<body>

<div class="card">
<b>VX21 MASTER</b><br><br>

Grup:
<select id="grup">
<option>TMŞ</option>
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BARA</option>
<option>BUTON</option>
<option>LAMBA</option>
<option>PAKO</option>
</select>

Ürün:
<input id="urun">

Rol:
<select id="rol">
<option>ANA GİRİŞ</option>
<option>DAĞITIM</option>
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Montaj:
<select id="montaj">
<option>DIN</option>
<option>TABAN</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="adres" placeholder="ÇIKIŞ-1">

Adet:
<input id="adet" value="1" type="number">

<br><br>

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>
</div>

<div class="card">
<b>ŞEMA</b>
<div id="liste"></div>
</div>

<div class="card">
<b>PANO YERLEŞİMİ</b>
<div id="pano"></div>
</div>

<div class="card kumanda">
<b>KUMANDA</b>
<div id="kumanda"></div>
</div>

<script>

let data=[]

function kontakTipi(g){
if(g=="BUTON") return "NO/NC"
if(g=="KONTAKTÖR") return "13-14"
if(g=="MOTOR KORUMA") return "13-14 / 21-22"
return "-"
}

function ekle(){
let g=grup.value
let u=urun.value
let r=rol.value
let m=montaj.value
let a=adres.value
let adet=parseInt(adet.value)

for(let i=0;i<adet;i++){
data.push({g,u,r,m,a})
}

render()
}

function temizle(){
data=[]
render()
}

function render(){

// liste
liste.innerHTML=data.map((x,i)=>
`${i+1}. ${x.g} - ${x.u} (${x.a})`
).join("<br>")

// sıralama
let giris=data.filter(x=>x.r=="ANA GİRİŞ")
let dagitim=data.filter(x=>x.r=="DAĞITIM")
let cikis=data.filter(x=>x.r=="ÇIKIŞ")
let kum=data.filter(x=>x.r=="KUMANDA")

// çıkış gruplama
let cikisGruplar={}
cikis.forEach(x=>{
if(!cikisGruplar[x.a]) cikisGruplar[x.a]=[]
cikisGruplar[x.a].push(x)
})

// pano
let html='<div class="wrap">'

// giriş
html+=blok("ANA GİRİŞ",giris,"giris")

// dağıtım
html+=blok("DAĞITIM",dagitim,"dagitim")

// çıkışlar
for(let key in cikisGruplar){
html+=blok(key,cikisGruplar[key],"cikis")
}

html+='</div>'

pano.innerHTML=html

// kumanda
kumanda.innerHTML=kum.map(x=>
`<div class="taban">${x.g} (${kontakTipi(x.g)})</div>`
).join("")

}

// blok fonksiyonu
function blok(ad,liste,cls){

if(liste.length==0) return ""

let din=""
let taban=""

liste.forEach(x=>{
if(x.m=="DIN"){
din+=`<div class="din">${x.g}<br><span class="small">${kontakTipi(x.g)}</span></div>`
}else{
taban+=`<div class="taban">${x.g}</div>`
}
})

return `
<div class="group ${cls}">
<div class="baslik">${ad}</div>

<div><b>DIN</b><br>${din}</div>
<div><b>TABAN</b><br>${taban}</div>

</div>
`
}

</script>

</body>
</html>
