<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>VX23 Pano Motoru</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
.wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
.group{border:2px solid #ccc;border-radius:10px;padding:10px}
.item{padding:6px;margin:4px;border-radius:6px;background:#eef}
.ok{font-size:18px;margin:2px}
.kumanda{background:#f5f3ff}
</style>

</head>
<body>

<div class="card">
<b>VX23 — AKIŞ MOTORU</b><br><br>

Grup:
<select id="g">
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BUTON</option>
<option>LAMBA</option>
<option>PAKO</option>
<option>RÖLE</option>
</select>

Ürün: <input id="u">
Adres: <input id="a" placeholder="ÇIKIŞ-1">

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>
</div>

<div class="card">
<b>PANO</b>
<div id="pano"></div>
</div>

<script>

let data=[]

function ekle(){
data.push({
g:g.value,
u:u.value,
a:a.value
})
render()
}

function temizle(){
data=[]
render()
}

function render(){

let cikislar={}

data.forEach(x=>{
if(!cikislar[x.a]) cikislar[x.a]=[]
cikislar[x.a].push(x)
})

let html='<div class="wrap">'

Object.keys(cikislar).forEach(c=>{

let grup=cikislar[c]

// AYIR
let guc=[]
let kumanda=[]

grup.forEach(x=>{
if(["RCCB","MCB","KONTAKTÖR","MOTOR KORUMA"].includes(x.g))
guc.push(x)
else
kumanda.push(x)
})

// SIRALA
let gucSira=["RCCB","MCB","KONTAKTÖR","MOTOR KORUMA"]
guc.sort((a,b)=>gucSira.indexOf(a.g)-gucSira.indexOf(b.g))

let kumandaSira=["RÖLE","PAKO","BUTON","LAMBA"]
kumanda.sort((a,b)=>kumandaSira.indexOf(a.g)-kumandaSira.indexOf(b.g))

html+=`<div class="group">
<b>${c}</b><br><br>

<b>GÜÇ</b><br>
${guc.map((x,i)=>
`<div class="item">${x.g}</div>
${i<guc.length-1?'<div class="ok">↓</div>':''}`
).join("")}

<hr>

<b>KUMANDA</b><br>
${kumanda.map((x,i)=>
`<div class="item kumanda">${x.g}</div>
${i<kumanda.length-1?'<div class="ok">→</div>':''}`
).join("")}

</div>`

})

html+='</div>'

pano.innerHTML=html
}

</script>

</body>
</html>
