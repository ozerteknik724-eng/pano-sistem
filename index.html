<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VX17 PRO Pano Sistemi</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --border:#d8e0ea;
      --text:#1f2937;
      --muted:#6b7280;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --red:#dc2626;
      --gray:#6b7280;
      --green:#16a34a;
      --amber:#d97706;
      --din:#eef6ff;
      --taban:#fef3c7;
      --yardimci:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:14px;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      display:grid;
      grid-template-columns:1.15fr 0.85fr;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      margin-bottom:14px;
    }
    .title{
      font-size:20px;
      font-weight:700;
      margin-bottom:10px;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:-4px;
      margin-bottom:10px;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:end;
    }
    .field{
      min-width:150px;
      flex:1;
    }
    .field.small{
      max-width:120px;
      flex:0 0 120px;
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }
    select,input{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#fff;
      font-size:14px;
    }
    button{
      border:none;
      border-radius:8px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      background:var(--blue);
      color:#fff;
    }
    button.gray{background:var(--gray)}
    button.red{background:var(--red)}
    button.green{background:var(--green)}
    button.small{
      padding:6px 10px;
      font-size:12px;
      margin-right:4px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      border-bottom:1px solid #eef2f7;
      text-align:left;
      padding:8px 6px;
      vertical-align:top;
    }
    th{
      font-size:12px;
      color:var(--muted);
    }

    .schema-flow{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
    }
    .schema-box{
      min-width:126px;
      background:var(--blue-soft);
      border:1px solid #bfd7ff;
      border-radius:10px;
      padding:10px;
      font-size:13px;
      text-align:center;
      line-height:1.35;
    }
    .arrow{
      font-size:18px;
      color:var(--muted);
    }

    .area-card{
      border-radius:10px;
      padding:10px;
      margin-bottom:12px;
      border:1px solid;
    }
    .area-din{
      background:var(--din);
      border-color:#cfe2ff;
    }
    .area-taban{
      background:var(--taban);
      border-color:#f7d787;
    }
    .area-yardimci{
      background:var(--yardimci);
      border-color:#d6d9de;
    }
    .area-head{
      font-weight:700;
      margin-bottom:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .din-body, .taban-body, .yardimci-body{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      min-height:52px;
    }
    .mod{
      background:#fff;
      border:1px solid #cfd8e3;
      border-radius:8px;
      min-width:88px;
      padding:8px 6px;
      text-align:center;
      font-size:12px;
      line-height:1.25;
    }
    .mod small{
      display:block;
      color:var(--muted);
      margin-top:2px;
      font-size:11px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .summary-box{
      background:#f8fafc;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
    }
    .summary
