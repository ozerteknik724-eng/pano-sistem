<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Pano Ölçü VX</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, select { padding:6px; margin:5px; }
button { padding:6px 10px; margin:5px; }
.card { background:#222; padding:10px; border-radius:8px; margin-bottom:10px; }
</style>
</head>

<body>

<h2>⚡ Pano Ölçü VX</h2>

<div class="card">
  <input id="grup" placeholder="Grup (M1, M2)">
  <select id="malzeme">
    <option>RCCB</option>
    <option>MTK</option>
    <option>KONTAKTOR</option>
    <option>PAKO</option>
    <option>MCB</option>
    <option>MKS-03</option>
  </select>
  <button onclick="ekle()">Ekle</button>
</div>

<div id="liste"></div>
<h3 id="sonuc"></h3>

<script>
let urunler = {
  "RCCB": 7,
  "MTK": 4.5,
  "KONTAKTOR": 4.5,
  "PAKO": 3,
  "MCB": 2,
  "MKS-03": 3
};

let liste = [];

function ekle() {
  let grup = document.getElementById("grup").value;
  let malzeme = document.getElementById("malzeme").value;

  liste.push({ grup, malzeme });
  goster();
}

function goster() {
  let html = "";
  let toplam = 0;

  liste.forEach(item => {
    html += `<div>${item.grup} - ${item.malzeme}</div>`;
    toplam += urunler[item.malzeme];
  });

  document.getElementById("liste").innerHTML = html;

  let din = Math.ceil(toplam / 50);
  let pano = "";

  if (din <= 3) pano = "40x60";
  else if (din <= 5) pano = "60x80";
  else pano = "80x120 veya Bölmeli";

  document.getElementById("sonuc").innerHTML =
    `Toplam: ${toplam} cm | DIN: ${din} | Pano: ${pano}`;
}
</script>

</body>
</html>
