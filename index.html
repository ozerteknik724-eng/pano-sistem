<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX16 PRO Pano Sistemi</title>

<style>
body {font-family: Arial; background:#f3f6fb; padding:10px}
.card {background:#fff; padding:12px; margin-bottom:10px; border-radius:10px}
select,input {padding:6px; margin:3px}
button {padding:6px 10px; border:none; border-radius:6px; background:#2563eb; color:#fff}
.del {background:red}
.item {background:#eef; padding:6px; margin:3px; border-radius:6px}
</style>
</head>

<body>

<div class="card">
<b>ŞEMA GİRİŞ</b><br>

<select id="grup" onchange="urunGetir()">
<option value="">Grup Seç</option>
<option>Koruma</option>
<option>Şalter</option>
<option>Motor</option>
</select>

<select id="urun">
<option>Ürün Seç</option>
</select>

<input id="cikis" placeholder="ÇIKIŞ">
<input id="adet" type="number" value="1">

<button onclick="ekle()">EKLE</button>
</div>

<div class="card">
<b>ŞEMA</b>
<div id="sema"></div>
</div>

<div class="card">
<b>PANO</b>
<div id="pano"></div>
</div>

<div class="card">
<b>MALZEME</b>
<div id="malzeme"></div>
</div>

<script>

let liste = []

let veri = {
"Koruma":["RCCB","MCB"],
"Şalter":["TMŞ","ATS"],
"Motor":["Kontaktör","Termik"]
}

function urunGetir(){
let grup = document.getElementById("grup").value
let urun = document.getElementById("urun")

urun.innerHTML=""

veri[grup]?.forEach(u=>{
let o = document.createElement("option")
o.text=u
urun.add(o)
})
}

function ekle(){
let grup = document.getElementById("grup").value
let urun = document.getElementById("urun").value
let cikis = document.getElementById("cikis").value
let adet = document.getElementById("adet").value

if(!urun) return alert("Ürün seç")

liste.push({urun,cikis,adet})

guncelle()
}

function sil(i){
liste.splice(i,1)
guncelle()
}

function guncelle(){

// ŞEMA
let s=""
liste.forEach((x,i)=>{
s += `<div class="item">${x.urun} - ${x.cikis} (${x.adet}) 
<button class="del" onclick="sil(${i})">X</button></div>`
})
document.getElementById("sema").innerHTML=s

// PANO
let p=""
let din=1
liste.forEach(x=>{
p+=`<div class="item">DIN-${din} ${x.urun}</div>`
if(Math.random()>0.5) din++
})
document.getElementById("pano").innerHTML=p

// MALZEME
let m={}
liste.forEach(x=>{
m[x.urun]=(m[x.urun]||0)+parseInt(x.adet)
})

let ms=""
for(let k in m){
ms+=`${k} x ${m[k]}<br>`
}
document.getElementById("malzeme").innerHTML=ms

// input reset
document.getElementById("cikis").value=""
document.getElementById("adet").value=1
}

</script>

</body>
</html>
