<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VX26 MASTER</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
.item{border:1px solid #999;padding:8px;margin:6px;text-align:center;background:#eef}
.kumanda{background:#f5f3ff}
</style>

</head>
<body>

<div class="card">
<b>ELEMAN EKLE</b><br><br>

Grup:
<select id="g">
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>BUTON</option>
<option>PAKO</option>
<option>RÖLE</option>
<option>LAMBA</option>
</select>

Ürün:
<input id="u" placeholder="örn: Start Buton">

Rol:
<select id="r">
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="a" placeholder="ÇIKIŞ-1">

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>
</div>

<div class="card">
<b>GÜÇ AKIŞI</b>
<div id="guc"></div>
</div>

<div class="card kumanda">
<b>KUMANDA AKIŞI</b>
<div id="kumanda"></div>
</div>

<script>

let data=[]

function ekle(){
data.push({
g:g.value,
u:u.value,
r:r.value,
a:a.value
})
render()
}

function temizle(){
data=[]
render()
}

function baglanti(e){

if(e.g=="BUTON"){
if(e.u.toLowerCase().includes("stop")) return "NC 21-22"
if(e.u.toLowerCase().includes("start")) return "NO 13-14"
}

if(e.g=="KONTAKTÖR") return "A1-A2"
if(e.g=="MOTOR KORUMA") return "13-14"
if(e.g=="PAKO") return "1-0-2"
if(e.g=="RÖLE") return "1-2"

return "-"
}

function render(){

let cikislar={}

data.forEach(x=>{
if(!cikislar[x.a]) cikislar[x.a]=[]
cikislar[x.a].push(x)
})

// GÜÇ
let gucHTML=""

Object.keys(cikislar).forEach(c=>{

let list = cikislar[c].filter(x=>x.r=="ÇIKIŞ")

let order=["RCCB","MCB","KONTAKTÖR","MOTOR KORUMA"]

list.sort((a,b)=>order.indexOf(a.g)-order.indexOf(b.g))

gucHTML+=`<b>${c}</b><br>`

list.forEach((e,i)=>{
gucHTML+=`
<div class="item">
${e.g}<br>${e.u}
</div>
${i<list.length-1?"↓":""}
`
})

gucHTML+="<br><br>"
})

guc.innerHTML=gucHTML


// KUMANDA
let kumHTML=""

Object.keys(cikislar).forEach(c=>{

let list = cikislar[c].filter(x=>x.r=="KUMANDA")

kumHTML+=`<b>${c}</b><br>FAZ<br>↓`

list.forEach(e=>{
kumHTML+=`
<div class="item kumanda">
${e.g}<br>${e.u}<br>
${baglanti(e)}
</div>↓
`
})

kumHTML+=`A1<br><br>`
})

kumanda.innerHTML=kumHTML

}

</script>

</body>
</html>
