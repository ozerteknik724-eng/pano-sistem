<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VX MASTER FULL + ÇİZİM MOTORU</title>

<style>
body{font-family:Arial;background:#f3f6fb;padding:10px}

.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}

select,input{padding:6px;margin:3px}

button{padding:6px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px}

.wrap{display:flex;flex-direction:column;gap:10px}

.line{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  background:#e0f2fe;
  padding:8px 10px;
  border-radius:6px;
  border:1px solid #999;
  font-size:13px;
}

.arrow{
  font-size:18px;
  color:red;
}

.kumanda{
  background:#f3e8ff;
}

h3{margin:5px 0}
</style>

</head>
<body>

<div class="card">
<b>ELEMAN EKLE</b><br><br>

Grup:
<select id="g">
<option>TMŞ</option>
<option>RCCB</option>
<option>MCB</option>
<option>KONTAKTÖR</option>
<option>MOTOR KORUMA</option>
<option>GERİLİM RÖLESİ</option>
<option>PAKO</option>
<option>BUTON</option>
<option>LAMBA</option>
</select>

Ürün:
<input id="u" placeholder="3x125A / Kontaktör 25A">

Rol:
<select id="r">
<option>ANA GİRİŞ</option>
<option>DAĞITIM</option>
<option>ÇIKIŞ</option>
<option>KUMANDA</option>
</select>

Adres:
<input id="a" placeholder="ÇIKIŞ-1">

Bağlı Olduğu:
<input id="b" placeholder="ÇIKIŞ-1">

Adet:
<input id="adet" value="1">

<button onclick="ekle()">EKLE</button>
<button onclick="temizle()">TEMİZLE</button>

</div>

<div class="card">
<h3>GÜÇ AKIŞI</h3>
<div id="guc"></div>
</div>

<div class="card kumanda">
<h3>KUMANDA AKIŞI</h3>
<div id="kumanda"></div>
</div>

<script>

let data=[]

function ekle(){
let adet=parseInt(document.getElementById("adet").value)

for(let i=0;i<adet;i++){
data.push({
g:g.value,
u:u.value,
r:r.value,
a:a.value,
b:b.value
})
}

render()
}

function temizle(){
data=[]
render()
}

function render(){

// GÜÇ
let gucHTML=""

let cikislar = [...new Set(data.filter(x=>x.r=="ÇIKIŞ").map(x=>x.a))]

cikislar.forEach(c => {

let elemanlar = data.filter(x=>x.a==c && x.r!="KUMANDA")

gucHTML += `<div class="line"><b>${c}</b>`

elemanlar.forEach((e,i)=>{
gucHTML += `<div class="box">${e.g}<br>${e.u}</div>`

if(i < elemanlar.length-1){
gucHTML += `<div class="arrow">→</div>`
}
})

gucHTML += `</div><br>`
})

guc.innerHTML = gucHTML


// KUMANDA
let kumandaHTML=""

cikislar.forEach(c => {

let elemanlar = data.filter(x=>x.b==c)

if(elemanlar.length==0) return

kumandaHTML += `<div class="line
